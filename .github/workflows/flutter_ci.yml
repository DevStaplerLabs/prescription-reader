name: Flutter CI

on:
  push:
    branches: [ "main", "master", "frontend" ]
  pull_request:
    branches: [ "main", "master", "frontend" ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd mobile
          flutter pub get

      - name: Run Flutter Analyze
        run: |
          cd mobile
          flutter analyze
